name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "infra/scripts/build_frontend_static.sh"
      - "infra/scripts/deploy_frontend_from_tf.sh"
      - "infra/scripts/deploy_frontend.sh"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_DIR: infra/terraform/envs/dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init (read outputs)
        run: |
          if [[ -n "${{ secrets.ATWC26_TF_STATE_BUCKET }}" ]]; then
            terraform -chdir="$TF_DIR" init -input=false -reconfigure \
              -backend-config="bucket=${{ secrets.ATWC26_TF_STATE_BUCKET }}" \
              -backend-config="key=atwc26-v2/dev/terraform.tfstate" \
              -backend-config="region=${{ secrets.AWS_REGION }}" \
              -backend-config="encrypt=true"
          else
            terraform -chdir="$TF_DIR" init -input=false -backend=false
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build static frontend (API Gateway URLs)
        run: |
          API_URL="$(terraform -chdir="$TF_DIR" output -raw api_gateway_url)"
          NEXT_PUBLIC_ANALYTICS_API_URL="$API_URL" \
          NEXT_PUBLIC_PREDICT_API_URL="$API_URL" \
          ./infra/scripts/build_frontend_static.sh

      - name: Deploy to S3 + invalidate CloudFront
        run: ./infra/scripts/deploy_frontend_from_tf.sh

      - name: Deployed URL
        run: |
          SITE="$(terraform -chdir="$TF_DIR" output -raw site_url)"
          {
            echo "## Frontend deployed"
            echo ""
            echo "| Target | URL |"
            echo "|--------|-----|"
            echo "| Site | ${SITE} |"
          } >> "$GITHUB_STEP_SUMMARY"
