name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "infra/scripts/build_frontend_static.sh"
      - "infra/scripts/deploy_frontend_from_tf.sh"
      - "infra/scripts/deploy_frontend.sh"
  workflow_dispatch:
    inputs:
      environment:
        description: Target stack
        type: choice
        options:
          - prod
          - dev
        default: prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && 'production' || '' }}
    env:
      TF_DIR: infra/terraform/envs/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init (read outputs)
        run: |
          STATE_KEY="atwc26-v2/${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}/terraform.tfstate"
          if [[ -n "${{ secrets.ATWC26_TF_STATE_BUCKET }}" ]]; then
            terraform -chdir="$TF_DIR" init -input=false -reconfigure \
              -backend-config="bucket=${{ secrets.ATWC26_TF_STATE_BUCKET }}" \
              -backend-config="key=${STATE_KEY}" \
              -backend-config="region=${{ secrets.AWS_REGION }}" \
              -backend-config="encrypt=true"
          else
            terraform -chdir="$TF_DIR" init -input=false -backend=false
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build static frontend (same-origin /api via CloudFront)
        env:
          ATWC26_TF_DIR: ${{ env.TF_DIR }}
        run: |
          NEXT_PUBLIC_SAME_ORIGIN_API=true \
          ./infra/scripts/build_frontend_static.sh

      - name: Deploy to S3 + invalidate CloudFront
        env:
          ATWC26_TF_DIR: ${{ env.TF_DIR }}
        run: ./infra/scripts/deploy_frontend_from_tf.sh

      - name: Deployed URL
        run: |
          SITE="$(terraform -chdir="$TF_DIR" output -raw site_url)"
          {
            echo "## Frontend deployed"
            echo ""
            echo "| Target | URL |"
            echo "|--------|-----|"
            echo "| Site | ${SITE} |"
          } >> "$GITHUB_STEP_SUMMARY"
