name: Pipeline

on:
  push:
    branches: [refactor/v2-integration]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      etl: ${{ steps.filter.outputs.etl }}
      analytics: ${{ steps.filter.outputs.analytics }}
      predict: ${{ steps.filter.outputs.predict }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            etl:
              - 'data/**'
              - 'etl/**'
              - 'packages/atwc26_core/**'
              - 'tests/etl/**'
            analytics:
              - 'services/analytics_api/**'
              - 'services/shared/**'
              - 'packages/atwc26_core/**'
              - 'infra/**'
            predict:
              - 'services/predict_api/**'
              - 'services/shared/**'
              - 'packages/atwc26_core/**'
              - 'infra/terraform/modules/ecs-compute/**'
            frontend:
              - 'frontend/**'
              - 'infra/scripts/build_frontend_static.sh'

  etl:
    needs: changes
    if: needs.changes.outputs.etl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e packages/atwc26_core
          pip install pytest boto3

      - name: Transform + simulate + QA
        env:
          ATWC26_SIMULATE_TRIALS: "100"
        run: make etl-local

      - name: ETL tests
        run: PYTHONPATH=. pytest tests/etl etl/qa -q

  package-analytics:
    needs: changes
    if: needs.changes.outputs.analytics == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package Lambda artifacts
        run: ./infra/scripts/package_lambdas.sh

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: infra/build/lambdas/*.zip
          retention-days: 1

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Static export build check
        run: |
          NEXT_PUBLIC_ANALYTICS_API_URL=http://localhost:8001 \
          NEXT_PUBLIC_PREDICT_API_URL=http://localhost:8000 \
          ./infra/scripts/build_frontend_static.sh
