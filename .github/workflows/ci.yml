name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r e2e/requirements-dev.txt

      - name: Run API end-to-end tests
        run: pytest e2e -q -c e2e/pytest.ini
