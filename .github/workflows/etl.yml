name: ETL

on:
  workflow_dispatch:
    inputs:
      run_scrape:
        description: Scrape ESPN before transform (network; manual only)
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  id-token: write

jobs:
  etl-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e packages/atwc26_core
          pip install pytest boto3

      - name: Scrape ESPN data
        if: github.event_name == 'workflow_dispatch' && inputs.run_scrape == true
        run: |
          make schedule scrape events squads groups

      - name: Transform + simulate + QA (uses committed data artifacts)
        env:
          ATWC26_SIMULATE_TRIALS: "100"
        run: make etl-local

      - name: ETL tests
        run: PYTHONPATH=. pytest tests/etl etl/qa -q

  etl-publish:
    if: github.event_name == 'workflow_dispatch'
    needs: etl-local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e packages/atwc26_core
          pip install boto3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish to S3 + DynamoDB + warm compute
        env:
          ATWC26_S3_BUCKET: ${{ secrets.ATWC26_S3_BUCKET }}
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          ATWC26_LAMBDA_ANALYTICS_NAME: ${{ secrets.ATWC26_LAMBDA_ANALYTICS_NAME }}
          ATWC26_LAMBDA_PREDICT_NAME: ${{ secrets.ATWC26_LAMBDA_PREDICT_NAME }}
          ATWC26_ECS_CLUSTER: ${{ secrets.ATWC26_ECS_CLUSTER }}
          ATWC26_ECS_SERVICES: ${{ secrets.ATWC26_ECS_SERVICES }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GITHUB_SHA: ${{ github.sha }}
        run: make etl-publish
