name: ETL

on:
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: Skip ESPN scrape (use committed data/ artifacts only)
        type: boolean
        default: false
      skip_publish:
        description: Skip S3/DynamoDB publish after transform
        type: boolean
        default: false
      trigger_game_id:
        description: Scheduler game ID that triggered this run (empty for manual runs)
        type: string
        default: ""
  # Scheduled runs: AWS EventBridge cron(*/5 * * * ? *) UTC → Lambda probes ESPN,
  # dispatches ETL at kickoff+105m (group: +60m window, knockout: +225m window).

concurrency:
  group: etl-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e packages/atwc26_core
          pip install pytest boto3

      - name: Configure AWS credentials
        if: inputs.trigger_game_id != '' || github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true
        env:
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          AWS_SESSION_TOKEN: ""
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Check scheduler trigger still needed
        id: trigger
        env:
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          gid="${{ inputs.trigger_game_id }}"
          if [[ -z "$gid" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Manual or untagged run — proceeding."
            exit 0
          fi
          if python -m etl.changed check-trigger "$gid"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Game $gid already processed — skipping ETL run."
          fi

      - name: Restore scrape state
        if: steps.trigger.outputs.needed != 'false' && (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
        env:
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -m etl.changed restore-state

      - name: Sync published artifacts
        if: steps.trigger.outputs.needed != 'false' && (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
        env:
          ATWC26_S3_BUCKET: ${{ secrets.ATWC26_S3_BUCKET }}
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          PYTHONPATH=. python -c "
          from services.shared.data_sync import sync_from_manifest
          updated = sync_from_manifest()
          print(f'synced {len(updated)} artifact(s) from S3')
          "

      - name: Load prior fingerprint
        if: steps.trigger.outputs.needed != 'false' && (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
        env:
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -m etl.changed load-remote /tmp/etl-fp.json

      - name: Scrape ESPN data
        if: steps.trigger.outputs.needed != 'false' && (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
        run: |
          make schedule scrape events squads groups

      - name: Detect data changes
        id: detect
        if: steps.trigger.outputs.needed != 'false'
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.skip_scrape }}" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "train=true" >> "$GITHUB_OUTPUT"
            echo "skip_scrape — running transform on committed data"
          elif python -m etl.changed compare /tmp/etl-fp.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            if python -m etl.changed compare-matches /tmp/etl-fp.json; then
              echo "train=true" >> "$GITHUB_OUTPUT"
            else
              echo "train=false" >> "$GITHUB_OUTPUT"
              echo "bracket/standings only — skipping model training"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new scraped data — skipping transform and publish."
          fi

      - name: Persist scrape state
        if: |
          steps.trigger.outputs.needed != 'false' &&
          steps.detect.outputs.changed == 'false' &&
          (github.event_name != 'workflow_dispatch' || inputs.skip_scrape != true)
        env:
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -m etl.changed save-scrape-state

      - name: Transform + simulate + QA
        if: steps.trigger.outputs.needed != 'false' && steps.detect.outputs.changed == 'true'
        env:
          ATWC26_SIMULATE_TRIALS: "1000"
          ATWC26_SKIP_TRAIN: ${{ steps.detect.outputs.train == 'false' && '1' || '' }}
        run: make etl-local

      - name: ETL tests
        if: steps.trigger.outputs.needed != 'false' && steps.detect.outputs.changed == 'true'
        run: PYTHONPATH=. pytest tests/etl etl/qa -q

      - name: Configure AWS credentials
        if: |
          steps.trigger.outputs.needed != 'false' &&
          steps.detect.outputs.changed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.skip_publish != true) &&
          (github.event_name == 'workflow_dispatch' && inputs.skip_scrape == true)
        env:
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          AWS_SESSION_TOKEN: ""
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Verify AWS identity
        if: |
          steps.trigger.outputs.needed != 'false' &&
          steps.detect.outputs.changed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.skip_publish != true)
        run: aws sts get-caller-identity

      - name: Publish to S3 + DynamoDB + warm compute
        if: |
          steps.trigger.outputs.needed != 'false' &&
          steps.detect.outputs.changed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.skip_publish != true)
        env:
          ATWC26_S3_BUCKET: ${{ secrets.ATWC26_S3_BUCKET }}
          ATWC26_DYNAMODB_TABLE: ${{ secrets.ATWC26_DYNAMODB_TABLE }}
          ATWC26_LAMBDA_ANALYTICS_NAME: ${{ secrets.ATWC26_LAMBDA_ANALYTICS_NAME }}
          ATWC26_LAMBDA_PREDICT_NAME: ${{ secrets.ATWC26_LAMBDA_PREDICT_NAME }}
          ATWC26_ECS_CLUSTER: ${{ secrets.ATWC26_ECS_CLUSTER }}
          ATWC26_ECS_SERVICES: ${{ secrets.ATWC26_ECS_SERVICES }}
          ATWC26_PREDICT_SERVICE_URL: ${{ secrets.ATWC26_PREDICT_SERVICE_URL }}
          ATWC26_RELOAD_SECRET: ${{ secrets.ATWC26_RELOAD_SECRET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GITHUB_SHA: ${{ github.sha }}
          ETL_BEFORE_FINGERPRINT: /tmp/etl-fp.json
        run: make etl-publish

      - name: Run summary
        if: always()
        run: |
          {
            echo "## ETL run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            if [[ "${{ steps.trigger.outputs.needed }}" == "false" ]]; then
              echo "| Status | skipped — game \`${{ inputs.trigger_game_id }}\` already processed |"
            elif [[ "${{ steps.detect.outputs.changed }}" == "true" ]]; then
              if [[ "${{ steps.detect.outputs.train }}" == "false" ]]; then
                echo "| Transform | ran (train skipped — bracket/standings only) |"
              else
                echo "| Transform | ran |"
              fi
              if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.skip_publish }}" != "true" ]]; then
                echo "| Publish | ran on this runner (same job as transform) |"
              else
                echo "| Publish | skipped (skip_publish) |"
              fi
            else
              echo "| Data changed | \`false\` |"
              echo "| Transform / publish | skipped — ESPN data unchanged since last run |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
