name: Terraform dev

on:
  push:
    branches: [main]
    paths:
      - "services/predict_api/**"
      - "services/shared/predict_bootstrap.py"
      - "packages/atwc26_core/atwc26_core/prediction.py"
      - "packages/atwc26_core/atwc26_core/data.py"
  workflow_dispatch:
    inputs:
      action:
        description: What to run
        type: choice
        options:
          - terraform-plan
          - terraform-apply
          - deploy-predict-ecs
        default: terraform-plan

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  package-lambdas:
    if: github.event_name == 'workflow_dispatch' && inputs.action != 'deploy-predict-ecs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package Lambda artifacts
        run: ./infra/scripts/package_lambdas.sh

      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: infra/build/lambdas/*.zip
          retention-days: 1

  terraform:
    if: github.event_name == 'workflow_dispatch' && inputs.action != 'deploy-predict-ecs'
    needs: [package-lambdas]
    runs-on: ubuntu-latest
    env:
      TF_DIR: infra/terraform/envs/dev
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: infra/build/lambdas/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Write terraform.tfvars
        if: env.TFVARS != ''
        env:
          TFVARS: ${{ secrets.ATWC26_TFVARS }}
        run: printf '%s\n' "$TFVARS" > "$TF_DIR/terraform.tfvars"

      - name: Terraform init
        run: |
          if [[ -n "${{ secrets.ATWC26_TF_STATE_BUCKET }}" ]]; then
            terraform -chdir="$TF_DIR" init -input=false -reconfigure \
              -backend-config="bucket=${{ secrets.ATWC26_TF_STATE_BUCKET }}" \
              -backend-config="key=atwc26-v2/dev/terraform.tfstate" \
              -backend-config="region=${AWS_REGION:-us-east-1}" \
              -backend-config="encrypt=true"
          else
            echo "::warning::ATWC26_TF_STATE_BUCKET not set — init with -backend=false (apply will not persist state)"
            terraform -chdir="$TF_DIR" init -input=false -backend=false
          fi

      - name: Terraform plan
        if: inputs.action == 'terraform-plan'
        run: terraform -chdir="$TF_DIR" plan -input=false -no-color

      - name: Terraform apply
        if: inputs.action == 'terraform-apply'
        run: terraform -chdir="$TF_DIR" apply -input=false -auto-approve -no-color

      - name: Capture Terraform outputs
        id: tf
        if: inputs.action == 'terraform-apply'
        run: |
          {
            echo "api_gateway_url=$(terraform -chdir="$TF_DIR" output -raw api_gateway_url)"
            echo "cloudfront_url=$(terraform -chdir="$TF_DIR" output -raw cloudfront_url)"
            echo "site_url=$(terraform -chdir="$TF_DIR" output -raw site_url)"
            echo "data_bucket_name=$(terraform -chdir="$TF_DIR" output -raw data_bucket_name)"
            echo "ecs_cluster_name=$(terraform -chdir="$TF_DIR" output -raw ecs_cluster_name 2>/dev/null || echo '')"
            echo "ecs_service_name=$(terraform -chdir="$TF_DIR" output -raw ecs_service_name 2>/dev/null || echo '')"
          } >> "$GITHUB_OUTPUT"

      - name: Stack outputs
        if: inputs.action == 'terraform-apply'
        run: |
          {
            echo "## Dev stack outputs"
            echo ""
            echo "| Target | URL |"
            echo "|--------|-----|"
            echo "| Frontend (CloudFront) | ${{ steps.tf.outputs.cloudfront_url }} |"
            echo "| Unified site (static + /api/*) | ${{ steps.tf.outputs.site_url }} |"
            echo "| API Gateway (direct) | ${{ steps.tf.outputs.api_gateway_url }} |"
            echo "| ETL data bucket | ${{ steps.tf.outputs.data_bucket_name }} |"
            if [ -n "${{ steps.tf.outputs.ecs_cluster_name }}" ]; then
              echo "| ECS cluster (compute) | ${{ steps.tf.outputs.ecs_cluster_name }} |"
              echo "| ECS service (compute) | ${{ steps.tf.outputs.ecs_service_name }} |"
            fi
            echo ""
            echo "### k6 A/B inputs"
            echo ""
            echo '```bash'
            echo "make k6-ab \\"
            echo "  K6_BASELINE_URL=https://atwc26.com \\"
            echo "  K6_CANDIDATE_ANALYTICS_URL=${{ steps.tf.outputs.api_gateway_url }} \\"
            echo "  K6_CANDIDATE_PREDICT_URL=${{ steps.tf.outputs.api_gateway_url }}"
            echo '```'
            echo ""
            echo "Or trigger **Performance** workflow with the API Gateway URL."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-predict-ecs:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy-predict-ecs')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_DIR: infra/terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ATWC26_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Resolve deploy targets
        id: targets
        run: |
          set -euo pipefail

          if [[ -n "${{ secrets.ATWC26_TF_STATE_BUCKET }}" ]]; then
            terraform -chdir="$TF_DIR" init -input=false -reconfigure \
              -backend-config="bucket=${{ secrets.ATWC26_TF_STATE_BUCKET }}" \
              -backend-config="key=atwc26-v2/dev/terraform.tfstate" \
              -backend-config="region=${{ secrets.AWS_REGION }}" \
              -backend-config="encrypt=true"
          else
            terraform -chdir="$TF_DIR" init -input=false -backend=false
          fi

          # Safe read — outputs may be missing until terraform apply provisions ECS.
          tf_output() {
            terraform -chdir="$TF_DIR" output -raw "$1" 2>/dev/null || true
          }

          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REGION="${{ secrets.AWS_REGION }}"
          REPO="atwc26-v2-dev-predict"

          ECR_URL="${{ secrets.ATWC26_ECR_PREDICT_URL }}"
          if [[ -z "$ECR_URL" ]]; then
            ECR_URL="$(tf_output ecr_predict_url)"
          fi
          if [[ -z "$ECR_URL" ]]; then
            ECR_URL="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${REPO}"
          fi

          if ! aws ecr describe-repositories --repository-names "$REPO" >/dev/null 2>&1; then
            echo "ECR repository ${REPO} not found — creating it"
            aws ecr create-repository \
              --repository-name "$REPO" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE
            echo "::notice::Created ${REPO}. Run terraform apply to adopt it in state (or import aws_ecr_repository.predict)."
          fi

          ECS_CLUSTER="${{ secrets.ATWC26_ECS_CLUSTER }}"
          if [[ -z "$ECS_CLUSTER" ]]; then
            ECS_CLUSTER="$(tf_output ecs_cluster_name)"
          fi

          ECS_SERVICE="${{ secrets.ATWC26_ECS_PREDICT_SERVICE }}"
          if [[ -z "$ECS_SERVICE" ]]; then
            ECS_SERVICE="$(tf_output ecs_service_name)"
          fi
          if [[ -z "$ECS_SERVICE" && -n "$ECS_CLUSTER" ]]; then
            ECS_SERVICE="${REPO}"
          fi

          ALB_DNS="$(tf_output compute_alb_dns)"

          if [[ -n "$ECS_CLUSTER" ]]; then
            if ! aws ecs describe-clusters \
                --clusters "$ECS_CLUSTER" \
                --region "$REGION" \
                --query 'clusters[?status==`ACTIVE`].clusterName' \
                --output text | grep -q .; then
              echo "::warning::ECS cluster ${ECS_CLUSTER} not found — pushing image only. Run Terraform apply with enable_ecs_compute=true first."
              ECS_CLUSTER=""
              ECS_SERVICE=""
              ALB_DNS=""
            fi
          fi

          if [[ -n "$ECS_CLUSTER" && -n "$ECS_SERVICE" ]]; then
            SERVICE_STATUS="$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --region "$REGION" \
              --query 'services[0].status' \
              --output text 2>/dev/null || echo MISSING)"
            if [[ "$SERVICE_STATUS" == "MISSING" || "$SERVICE_STATUS" == "None" || -z "$SERVICE_STATUS" ]]; then
              echo "::warning::ECS service ${ECS_SERVICE} not found in ${ECS_CLUSTER} — pushing image only. Run terraform apply (action: terraform-apply) first."
              ECS_CLUSTER=""
              ECS_SERVICE=""
              ALB_DNS=""
            fi
          fi

          echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=${ECS_CLUSTER}" >> "$GITHUB_OUTPUT"
          echo "ecs_service=${ECS_SERVICE}" >> "$GITHUB_OUTPUT"
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"
          echo "ecs_deploy_ready=$([[ -n "$ECS_CLUSTER" && -n "$ECS_SERVICE" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "ECR repository: ${ECR_URL}"
          echo "ECS cluster: ${ECS_CLUSTER:-<not configured>}"
          echo "ECS service: ${ECS_SERVICE:-<not configured>}"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push predict image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/predict_api/Dockerfile
          push: true
          tags: |
            ${{ steps.targets.outputs.ecr_url }}:latest
            ${{ steps.targets.outputs.ecr_url }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.targets.outputs.ecr_url }}:cache
          cache-to: type=registry,ref=${{ steps.targets.outputs.ecr_url }}:cache,mode=max

      - name: Force new ECS deployment
        id: ecs_deploy
        if: steps.targets.outputs.ecs_deploy_ready == 'true'
        run: |
          set +e
          aws ecs update-service \
            --cluster  "${{ steps.targets.outputs.ecs_cluster }}" \
            --service  "${{ steps.targets.outputs.ecs_service }}" \
            --force-new-deployment \
            --region   "${{ secrets.AWS_REGION }}"
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            echo "::warning::ECS update-service failed for ${{ steps.targets.outputs.ecs_cluster }}/${{ steps.targets.outputs.ecs_service }}. Image was still pushed to ECR."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Wait for service stability
        if: steps.ecs_deploy.outputs.deployed == 'true' && steps.targets.outputs.alb_dns != ''
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ steps.targets.outputs.ecs_cluster }}" \
            --services "${{ steps.targets.outputs.ecs_service }}" \
            --region   "${{ secrets.AWS_REGION }}"

      - name: Smoke test health endpoint
        if: steps.ecs_deploy.outputs.deployed == 'true' && steps.targets.outputs.alb_dns != ''
        run: |
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://${{ steps.targets.outputs.alb_dns }}/api/health" --max-time 10)
          echo "Health: HTTP $HTTP"
          [ "$HTTP" = "200" ] || exit 1

      - name: Run summary
        if: always()
        run: |
          {
            echo "## Predict ECS deploy"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| ECR image | \`${{ steps.targets.outputs.ecr_url }}:${{ github.sha }}\` |"
            if [[ "${{ steps.targets.outputs.ecs_deploy_ready }}" == "true" && "${{ steps.ecs_deploy.outputs.deployed }}" == "true" ]]; then
              echo "| ECS deploy | \`${{ steps.targets.outputs.ecs_cluster }}/${{ steps.targets.outputs.ecs_service }}\` |"
            elif [[ "${{ steps.targets.outputs.ecs_deploy_ready }}" == "true" ]]; then
              echo "| ECS deploy | image pushed; service update failed |"
            else
              echo "| ECS deploy | skipped — run **terraform-apply** first to provision ECS |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
