# AnalyseThisWC26 reverse proxy: single public origin, routes /api -> backend, / -> frontend.
# TLS termination + security headers + basic rate limiting live here.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Rate-limit the API to blunt abuse / scraping of the demo.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        # --- security headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # Enable HSTS once TLS (443) is terminated here or upstream:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --- ACME HTTP-01 challenge (Certbot proves domain ownership here) ---
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # --- API ---
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # --- frontend (Next.js) ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Next.js needs websocket upgrade for HMR in dev; harmless in prod.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
