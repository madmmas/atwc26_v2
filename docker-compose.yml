# AnalyseThisWC26 full stack.
# v1 (monolith):  docker compose up --build  -> http://localhost:8080
# v2 (split APIs): docker compose --profile v2 up --build
#   analytics :8001, predict :8000

services:
  backend:
    build: ./backend
    environment:
      ATWC26_CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      WEB_CONCURRENCY: "4"
      ATWC26_DATA_DIR: "/data"
    volumes:
      - ./data:/data:ro
    expose:
      - "8000"
    restart: unless-stopped

  analytics-api:
    profiles: ["v2"]
    build:
      context: .
      dockerfile: services/analytics_api/Dockerfile
    environment:
      ATWC26_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080"
      ATWC26_DATA_DIR: "/data"
      WEB_CONCURRENCY: "2"
    volumes:
      - ./data:/data:ro
    ports:
      - "8001:8001"
    restart: unless-stopped

  predict-api:
    profiles: ["v2"]
    build:
      context: .
      dockerfile: services/predict_api/Dockerfile
    environment:
      ATWC26_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080"
      ATWC26_DATA_DIR: "/data"
      WEB_CONCURRENCY: "2"
    volumes:
      - ./data:/data:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ANALYTICS_API_URL: "http://localhost:8001"
        NEXT_PUBLIC_PREDICT_API_URL: "http://localhost:8000"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certbot-webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
